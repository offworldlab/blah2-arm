version: '3'

networks:
    blah2:
      external: true

services:

  blah2:
    restart: always
    build: .
    image: blah2
    tty: true
    depends_on:
      - blah2_api
    environment:
      - BLAH2_VERBOSE=false
    volumes:
      - ./config:/opt/blah2/config
      - ./save:/opt/blah2/save
    networks:
      - blah2
    privileged: true
    command: bash -c "/opt/blah2/bin/blah2 -c /opt/blah2/config/config.yml || sleep infinity"
    container_name: blah2

  blah2_web:
    restart: always
    image: httpd:2.4
    ports:
      - 49154:80
    volumes:
      - ./web/html:/usr/local/apache2/htdocs
    networks:
      - blah2
    container_name: blah2-web

  blah2_api:
    restart: always
    build: ./api
    image: blah2_api
    # For local testing without radar hardware, add: MOCK_RADAR=true
    # and configure config.yml tar1090 to point to synthetic-adsb:5001
    volumes:
      - ./config:/usr/src/app/config
      - ./api/server.js:/usr/src/app/server.js
      - ./api/mock_radar.js:/usr/src/app/mock_radar.js
    ports:
      - "3000:3000"
    networks:
      - blah2
    command: "node server.js /usr/src/app/config/config.yml"
    container_name: blah2-api

  blah2_host:
    restart: always
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./host/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./host/html:/usr/local/apache2/htdocs:ro
    networks:
      - blah2
    container_name: blah2-host
    depends_on:
      - blah2_web
      - blah2_api

